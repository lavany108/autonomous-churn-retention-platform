<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Churn Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="dashboard">
    <header class="topbar">
        <h1>Retention Dashboard</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="segments.html">Segments</a>
            <a href="#" id="logoutLink">Logout</a>
        </nav>
    </header>

    <main id="dashboardMain" class="dashboard-layout">
        <section class="card">
            <h2>Customer Risk Analysis</h2>
            <p id="dashboardMessage" class="muted"></p>
            <form id="churnForm" class="stack-form">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <label for="tenure">Tenure (months)</label>
                <input id="tenure" type="number" name="tenure" min="0" required>

                <label for="monthlyCharges">Monthly Charges</label>
                <input id="monthlyCharges" type="number" name="MonthlyCharges" min="0" step="0.01" required>

                <label for="totalCharges">Total Charges</label>
                <input id="totalCharges" type="number" name="TotalCharges" min="0" step="0.01" required>

                <label for="contract">Contract</label>
                <select id="contract" name="Contract">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>

                <button class="btn btn-primary" type="submit">Analyze Risk</button>
            </form>
        </section>

        <section id="result" class="card hidden">
            <h2>Risk Analysis</h2>
            <p><strong>Churn Probability:</strong> <span id="probabilityText"></span></p>
            <p><strong>Risk Tier:</strong> <span id="riskTierBadge" class="badge">-</span></p>
            <p><strong>Customer Segment:</strong> <span id="segmentName">-</span></p>
            <p><strong>Segment Insight:</strong> <span id="segmentDescription">-</span></p>
            <div class="progress-container">
                <div id="probabilityBar" class="progress-bar"></div>
            </div>
            <p><strong>Recommended Action:</strong> <span id="actionBox"></span></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
